name: Reentrenar y desplegar F1 Predictor

# Cuándo se ejecuta (siempre reentrena con datos frescos y redespliega):
#   · push a main       -> publica los cambios de código al instante.
#   · cada 2 h Jue–Lun  -> recoge prácticas/clasificación/sprint/carrera del fin de
#                          semana y refina la predicción sola, sin intervención.
#   · manual            -> botón "Run workflow" en la pestaña Actions.
# La predicción se refina sola: forma → práctica (OpenF1) → clasificación → carrera.
on:
  push:
    branches: [ main ]              # cada push a main: reentrena con datos frescos y redespliega
  schedule:
    - cron: "0 */2 * * 0,1,4,5,6"   # Jue, Vie, Sáb, Dom, Lun · cada 2 horas
  workflow_dispatch: {}             # ejecución manual desde la pestaña "Actions"

concurrency:
  group: retrain-deploy
  cancel-in-progress: false

jobs:
  retrain-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar el código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Versiones PINEADAS: un breaking change silencioso de sklearn/pandas/numpy
      # rompería el entrenamiento del siguiente domingo sin aviso. Estos rangos
      # son los compatibles verificados con train.py (usa APIs estables:
      # GradientBoosting{Regressor,Classifier}, groupby().apply(), rolling(),
      # merge()). Si en el futuro necesitas subir mayor, corre localmente antes.
      - name: Instalar dependencias
        run: pip install --quiet "scikit-learn==1.5.*" "pandas==2.2.*" "numpy<2.1"

      - name: Descargar datos, reentrenar y predecir
        run: python3 train.py --download

      - name: Configurar Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Desplegar a Netlify (producción)
        timeout-minutes: 10                       # red de seguridad: nunca vuelve a colgarse 40+ min
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: c57fc590-43ad-4093-ab92-82b820812fc8   # resuelve el sitio en modo headless (sin "netlify link")
          CI: "true"                              # fuerza modo no interactivo (sin prompts que cuelguen el job)
        # versión FIJA del CLI (no @latest): evita roturas por cambios de versión como la del 28-jun
        run: npx --yes netlify-cli@17 deploy --prod --dir=public --site c57fc590-43ad-4093-ab92-82b820812fc8
